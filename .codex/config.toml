approval_policy = "on-request"

sandbox_mode = "read-only"
model = "gpt-5.2-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

[shell_environment_policy]
include_only = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL", "TERM"]

[profiles.cmd]
sandbox_mode = "workspace-write"
web_search="cached"
approval_policy = "on-request"
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[profiles.net]
[sandbox_workspace_write]
network_access = true
approval_policy = "on-request"

[tui]
status_line = ["current-dir", "model-with-reasoning", "context-remaining", "weekly-limit", "five-hour-limit"]

[projects."/home/gbi/GitHub/mend/renovate-pro"]
trust_level = "trusted"

[projects."/home/gbi/GitHub/mend/renovate-ce-ee"]
trust_level = "trusted"

[projects."/home/gbi/GitHub/mend/renovate-pro-helm"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

